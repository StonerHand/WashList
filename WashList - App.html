<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WashList — Music intelligence</title>
<meta name="description" content="Scan your Spotify library. Find real duplicates. Keep the music">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,300..900;1,300..900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/app.css">
<style>
  /* Page-level bg waveform */
  .bg-canvas {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none; opacity: .55;
    -webkit-mask-image: linear-gradient(to right, transparent 0%, black 14%, black 86%, transparent 100%);
            mask-image: linear-gradient(to right, transparent 0%, black 14%, black 86%, transparent 100%);
  }
  /* Display weight CSS var */
  .vh-title, .scan-board-title { font-weight: var(--display-weight, 500); }

  /* Found-list keyframe */
  @keyframes foundIn {
    from { opacity: 0; transform: translateX(-12px); }
    to   { opacity: 1; transform: translateX(0); }
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<canvas class="bg-canvas" id="bg-canvas" aria-hidden="true"></canvas>

<div id="root"></div>

<script src="js/waveform-bg.js"></script>
<script src="jsx/data.js"></script>
<script src="jsx/i18n.js"></script>
<script type="text/babel" src="jsx/icons.jsx"></script>
<script type="text/babel" src="jsx/tweaks-panel.jsx"></script>
<script type="text/babel" src="jsx/shell.jsx"></script>
<script type="text/babel" src="jsx/view-scan.jsx"></script>
<script type="text/babel" src="jsx/view-duplicates.jsx"></script>
<script type="text/babel" src="jsx/view-others.jsx"></script>
<script type="text/babel" src="jsx/app.jsx"></script>

<script>
  // Init mouse-reactive bg waveform
  window.addEventListener('load', () => {
    if (window.WashListWaveform) {
      window.WashListWaveform.init(document.getElementById('bg-canvas'), {
        density: 24,
        amplitude: 8,
        mouseAmp: 44,
        mouseRadius: 280,
        speed: 0.3,
        thickness: 1.0,
        eventTarget: window,
      });
    }
  });
</script>
</body>
</html>
